services:
  - type: web
    name: trix-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server2.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: models/gemini-embedding-001
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DOCUMENT_PATH
        value: knowledge.txt
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DEBUG
        value: false
    autoDeploy: true
